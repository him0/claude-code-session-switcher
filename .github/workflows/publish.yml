name: Publish

on:
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
      skip: ${{ steps.check-release.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: false

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if GitHub Release exists
        id: check-release
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "GitHub Release v$VERSION already exists - skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "GitHub Release v$VERSION does not exist - will create"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.asset }}
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: ccss-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: ccss-linux-arm64
          - os: macos-14
            target: bun-darwin-arm64
            asset: ccss-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build ./src/index.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.asset }}

      - name: Ad-hoc codesign (macOS)
        if: startsWith(matrix.target, 'bun-darwin')
        run: codesign -f -s - dist/${{ matrix.asset }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: [prepare, build]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: false

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body: |
            ## What's Changed

            See [CHANGELOG.md](./CHANGELOG.md) for details.
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
